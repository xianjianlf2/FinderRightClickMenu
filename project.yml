name: FinderRightClickMenu
options:
  bundleIdPrefix: com.evenmark
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_REQUIRED: "YES"
    CODE_SIGNING_ALLOWED: "YES"
    ENABLE_HARDENED_RUNTIME: "NO"
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  FinderRightClickMenu:
    type: application
    platform: macOS
    sources:
      - App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.evenmark.FinderRightClickMenu
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/App.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: MenuExtension
        embed: true
  MenuExtension:
    type: app-extension
    platform: macOS
    sources:
      - MenuExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.evenmark.FinderRightClickMenu.MenuExtension
        INFOPLIST_FILE: MenuExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: MenuExtension/MenuExtension.entitlements
